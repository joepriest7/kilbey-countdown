<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kilbey's Stag Do — Countdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
 
  :root {
    --gold:         #D4A84B;
    --gold-bright:  #F2D27A;
    --gold-deep:    #8B6914;
    --cream:        #F4EBD9;
    --bone:         #E8DCC0;
    --ink:          #1A0F08;
    --ink-soft:     #2E1F14;
    --burgundy:     #4A0E1F;
    --burgundy-deep:#2A0710;
    --crimson:      #8B0A1E;
  }
 
  html, body {
    width: 100%;
    min-height: 100vh;
    background: var(--ink);
    overflow-x: hidden;
    font-family: 'Cormorant Garamond', serif;
    color: var(--cream);
  }
 
  /* ─────────────────────────────────────────
     POSTER FRAME — mysterious, regal, redacted
     ───────────────────────────────────────── */
  .poster {
    width: 100vw;
    min-height: 100vh;
    position: relative;
    padding: 50px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse at 50% 0%,   rgba(139,10,30,0.22) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(139,10,30,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%,  rgba(212,168,75,0.10) 0%, transparent 60%),
      linear-gradient(180deg, #1A0F08 0%, #0E0905 50%, #1A0F08 100%);
  }
 
  /* paper grain */
  .poster::before {
    content: '';
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
    background-size: 220px 220px;
    opacity: 0.08;
    pointer-events: none;
    z-index: 1;
    mix-blend-mode: overlay;
  }
 
  .poster::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(45deg,
        transparent 0 18px,
        rgba(212,168,75,0.04) 18px 19px);
    pointer-events: none;
    z-index: 1;
  }
 
  /* ornate frame */
  .frame {
    position: absolute;
    inset: 22px;
    border: 2px solid var(--gold);
    z-index: 2;
    pointer-events: none;
  }
  .frame::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid var(--gold-deep);
  }
  .frame::after {
    content: '';
    position: absolute;
    inset: 14px;
    border: 1px dashed rgba(212,168,75,0.35);
  }
 
  /* corner flourishes */
  .flourish {
    position: absolute;
    width: 90px; height: 90px;
    z-index: 3;
    color: var(--gold);
    pointer-events: none;
  }
  .flourish svg { width: 100%; height: 100%; }
  .flourish.tl { top: 28px; left: 28px; }
  .flourish.tr { top: 28px; right: 28px; transform: scaleX(-1); }
  .flourish.bl { bottom: 28px; left: 28px; transform: scaleY(-1); }
  .flourish.br { bottom: 28px; right: 28px; transform: scale(-1,-1); }
 
  /* ─────────────────────────────────────────
     CONTENT
     ───────────────────────────────────────── */
  .content {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 100%;
    max-width: 900px;
  }
 
  /* ── hero groom medallion ── */
  .groom-medallion {
    position: relative;
    width: clamp(140px, 22vmin, 210px);
    height: clamp(140px, 22vmin, 210px);
    margin-bottom: 22px;
    animation: fadeDown 0.9s 0.05s ease both;
  }
  .groom-medallion .halo {
    position: absolute;
    inset: -28px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(242,210,122,0.4) 0%, rgba(212,168,75,0.18) 40%, transparent 70%);
    animation: haloPulse 3.5s ease-in-out infinite;
  }
  .groom-medallion .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid var(--gold);
    box-shadow:
      inset 0 0 0 4px var(--ink),
      inset 0 0 0 5px var(--gold-deep),
      0 0 0 6px var(--ink),
      0 0 0 7px var(--gold-deep),
      0 12px 50px rgba(0,0,0,0.8);
  }
  .groom-medallion img {
    position: absolute;
    inset: 8px;
    width: calc(100% - 16px);
    height: calc(100% - 16px);
    border-radius: 50%;
    object-fit: cover;
    object-position: center 30%;
    filter: sepia(0.15) saturate(1.05) contrast(1.05);
  }
  .groom-medallion::before,
  .groom-medallion::after {
    content: '◆';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    color: var(--crimson);
    font-size: 14px;
    text-shadow: 0 0 10px rgba(139,10,30,0.7);
    z-index: 2;
  }
  .groom-medallion::before { top: -10px; }
  .groom-medallion::after  { bottom: -10px; }
 
  /* ── eyebrow ── */
  .eyebrow {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: clamp(10px, 1.5vmin, 13px);
    letter-spacing: 0.7em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 6px;
    padding-left: 0.7em;
    animation: fadeDown 0.9s 0.1s ease both;
  }
  .eyebrow-script {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(14px, 2.2vmin, 19px);
    color: var(--bone);
    margin-bottom: 20px;
    opacity: 0.85;
    animation: fadeDown 0.9s 0.15s ease both;
  }
  .eyebrow-script::before,
  .eyebrow-script::after {
    content: '✦';
    color: var(--gold);
    margin: 0 14px;
    font-size: 0.7em;
    vertical-align: middle;
    opacity: 0.7;
  }
 
  /* ── HIS NAME title ── */
  .name {
    font-family: 'Cinzel', serif;
    font-weight: 800;
    font-size: clamp(56px, 11vmin, 130px);
    line-height: 0.9;
    letter-spacing: 0.05em;
    color: var(--gold-bright);
    text-shadow: 0 0 30px rgba(212,168,75,0.4), 0 2px 0 var(--gold-deep);
    animation: fadeDown 0.9s 0.2s ease both;
  }
  .name .apos {
    font-style: italic;
    font-weight: 700;
    color: var(--gold-bright);
  }
 
  /* name row with flanking beer mugs */
  .name-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(14px, 3vmin, 32px);
    animation: fadeDown 0.9s 0.2s ease both;
  }
  .name-row .beer {
    font-size: clamp(36px, 7vmin, 64px);
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.7));
    display: inline-block;
    transform-origin: bottom center;
  }
  .name-row .beer.left  { animation: clinkLeft  2.4s ease-in-out infinite; }
  .name-row .beer.right { animation: clinkRight 2.4s ease-in-out infinite; }
 
  .stag-do {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: clamp(28px, 5.5vmin, 56px);
    color: var(--cream);
    letter-spacing: 0.45em;
    line-height: 1;
    text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    padding-left: 0.45em;
    margin-top: 6px;
    margin-bottom: 22px;
    animation: fadeDown 0.9s 0.3s ease both;
  }
 
  /* ── ornament divider ── */
  .ornament {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 26px;
    color: var(--gold);
    animation: scaleIn 0.7s 0.45s ease both;
  }
  .ornament .line {
    height: 1px;
    width: clamp(60px, 14vmin, 130px);
    background: linear-gradient(90deg, transparent, var(--gold) 50%, transparent);
  }
  .ornament .diamond {
    color: var(--crimson);
    font-size: 14px;
    text-shadow: 0 0 12px rgba(139,10,30,0.7);
  }
  .ornament .diamond.gold { color: var(--gold); text-shadow: 0 0 12px rgba(212,168,75,0.6); }
 
  /* ── countdown ── */
  .countdown-label {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: clamp(10px, 1.6vmin, 14px);
    letter-spacing: 0.6em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-left: 0.6em;
    animation: fadeUp 0.9s 0.55s ease both;
  }
 
  .countdown {
    display: flex;
    gap: clamp(8px, 2vmin, 18px);
    align-items: stretch;
    margin-bottom: 32px;
    animation: fadeUp 0.9s 0.65s ease both;
  }
 
  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: clamp(14px, 2.5vmin, 22px) clamp(12px, 2.5vmin, 22px);
    min-width: clamp(78px, 14vmin, 130px);
    background:
      linear-gradient(180deg,
        rgba(74,14,31,0.55) 0%,
        rgba(26,15,8,0.7)  100%);
    border: 1px solid var(--gold-deep);
    position: relative;
    box-shadow:
      inset 0 1px 0 rgba(212,168,75,0.25),
      inset 0 -1px 0 rgba(0,0,0,0.5),
      0 8px 30px rgba(0,0,0,0.6);
  }
  .unit::before, .unit::after {
    content: '';
    position: absolute;
    width: 8px; height: 8px;
    border-color: var(--gold);
    border-style: solid;
    border-width: 0;
  }
  .unit::before {
    top: 4px; left: 4px;
    border-top-width: 1px; border-left-width: 1px;
  }
  .unit::after {
    bottom: 4px; right: 4px;
    border-bottom-width: 1px; border-right-width: 1px;
  }
 
  .unit-num {
    font-family: 'Cinzel', serif;
    font-weight: 800;
    font-size: clamp(38px, 8.5vmin, 88px);
    line-height: 1;
    color: var(--gold-bright);
    text-shadow:
      0 0 20px rgba(242,210,122,0.45),
      0 2px 0 var(--gold-deep);
    font-variant-numeric: tabular-nums;
    display: inline-block;
  }
  .unit-num.tick {
    animation: flip 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
  }
  .unit-label {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: clamp(9px, 1.3vmin, 11px);
    letter-spacing: 0.35em;
    color: var(--bone);
    text-transform: uppercase;
    margin-top: 10px;
    padding-left: 0.35em;
    opacity: 0.85;
  }
 
  /* ── REDACTED block (the joke) ── */
  .redacted-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    animation: fadeUp 0.9s 0.78s ease both;
  }
  .redacted-label {
    font-family: 'Cinzel', serif;
    font-size: clamp(9px, 1.4vmin, 12px);
    letter-spacing: 0.5em;
    color: var(--gold);
    text-transform: uppercase;
    padding-left: 0.5em;
    opacity: 0.8;
  }
  .redacted-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .redacted-bar {
    display: inline-block;
    height: clamp(18px, 2.8vmin, 24px);
    background: var(--ink);
    border: 1px solid var(--burgundy);
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(0,0,0,0.8);
  }
  .redacted-bar::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      90deg,
      transparent 0 4px,
      rgba(139,10,30,0.18) 4px 5px
    );
  }
  .redacted-bar.b1 { width: clamp(80px, 14vmin, 130px); }
  .redacted-bar.b2 { width: clamp(60px, 10vmin, 95px); }
  .redacted-bar.b3 { width: clamp(100px, 16vmin, 160px); }
 
  /* classified stamp */
  .stamp-classified {
    font-family: 'Cinzel', serif;
    font-weight: 800;
    font-size: clamp(13px, 2vmin, 17px);
    letter-spacing: 0.35em;
    color: var(--crimson);
    border: 2.5px solid var(--crimson);
    padding: 8px 18px 6px;
    text-transform: uppercase;
    transform: rotate(-4deg);
    box-shadow: inset 0 0 0 4px var(--ink), 0 0 0 1px var(--crimson);
    text-shadow: 0 0 14px rgba(139,10,30,0.5);
    margin-top: 4px;
  }
 
  /* ── date pill ── */
  .date-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 22px;
    animation: fadeUp 0.9s 0.88s ease both;
  }
  .date-pill {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 700;
    font-size: clamp(15px, 2.6vmin, 22px);
    letter-spacing: 0.04em;
    color: var(--cream);
    padding: 10px 32px;
    border-top: 1px solid var(--gold);
    border-bottom: 1px solid var(--gold);
    position: relative;
  }
  .date-pill::before, .date-pill::after {
    content: '❦';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: var(--crimson);
    font-size: 12px;
    text-shadow: 0 0 8px rgba(139,10,30,0.5);
  }
  .date-pill::before { left: 10px; }
  .date-pill::after  { right: 10px; }
 
  .date-sub {
    font-family: 'Cinzel', serif;
    font-size: clamp(9px, 1.4vmin, 12px);
    letter-spacing: 0.5em;
    color: var(--gold);
    margin-top: 8px;
    padding-left: 0.5em;
    text-transform: uppercase;
  }
 
  /* ── signoff ── */
  .signoff {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(13px, 2vmin, 17px);
    color: var(--bone);
    letter-spacing: 0.06em;
    animation: fadeUp 0.9s 0.98s ease both;
    text-align: center;
    max-width: 600px;
  }
  .signoff .from {
    display: block;
    font-family: 'Cinzel', serif;
    font-style: normal;
    font-size: 0.7em;
    letter-spacing: 0.5em;
    color: var(--gold);
    text-transform: uppercase;
    margin-top: 10px;
    padding-left: 0.5em;
  }
 
  /* ── Keyframes ── */
  @keyframes flip {
    0%   { transform: translateY(-10px) scaleY(0.85); opacity: 0.3; filter: blur(2px); }
    60%  { transform: translateY(2px)   scaleY(1.05); opacity: 1;   filter: blur(0); }
    100% { transform: translateY(0)     scaleY(1);    opacity: 1; }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { transform: scaleX(0); opacity: 0; }
    to   { transform: scaleX(1); opacity: 1; }
  }
  @keyframes haloPulse {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.08); }
  }
  @keyframes clinkLeft {
    0%, 100% { transform: rotate(0deg) translateY(0); }
    40%, 50% { transform: rotate(18deg) translateY(-4px); }
  }
  @keyframes clinkRight {
    0%, 100% { transform: rotate(0deg) translateY(0); }
    40%, 50% { transform: rotate(-18deg) translateY(-4px); }
  }
 
  /* responsive */
  @media (max-width: 520px) {
    .countdown { gap: 6px; }
    .unit { min-width: 0; padding: 12px 8px; }
    .unit-label { letter-spacing: 0.2em; font-size: 9px; }
    .stag-do { letter-spacing: 0.3em; padding-left: 0.3em; }
    .flourish { width: 56px; height: 56px; }
    .frame { inset: 14px; }
    .flourish.tl, .flourish.tr { top: 18px; }
    .flourish.tl, .flourish.bl { left: 18px; }
    .flourish.tr, .flourish.br { right: 18px; }
    .flourish.bl, .flourish.br { bottom: 18px; }
    .date-pill { padding: 10px 28px; }
  }
</style>
</head>
<body>
<div class="poster">
 
  <div class="frame"></div>
 
  <div class="flourish tl">
    <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.2">
      <path d="M5 5 L40 5 M5 5 L5 40" stroke-width="1.5"/>
      <path d="M10 10 Q 25 10, 30 25 Q 35 40, 50 40"/>
      <path d="M10 10 Q 10 25, 25 30 Q 40 35, 40 50"/>
      <circle cx="30" cy="30" r="3" fill="currentColor"/>
      <path d="M15 15 Q 22 22, 30 22 M15 15 Q 22 22, 22 30"/>
      <path d="M5 20 L 12 20 M20 5 L 20 12"/>
    </svg>
  </div>
  <div class="flourish tr">
    <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.2">
      <path d="M5 5 L40 5 M5 5 L5 40" stroke-width="1.5"/>
      <path d="M10 10 Q 25 10, 30 25 Q 35 40, 50 40"/>
      <path d="M10 10 Q 10 25, 25 30 Q 40 35, 40 50"/>
      <circle cx="30" cy="30" r="3" fill="currentColor"/>
      <path d="M15 15 Q 22 22, 30 22 M15 15 Q 22 22, 22 30"/>
      <path d="M5 20 L 12 20 M20 5 L 20 12"/>
    </svg>
  </div>
  <div class="flourish bl">
    <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.2">
      <path d="M5 5 L40 5 M5 5 L5 40" stroke-width="1.5"/>
      <path d="M10 10 Q 25 10, 30 25 Q 35 40, 50 40"/>
      <path d="M10 10 Q 10 25, 25 30 Q 40 35, 40 50"/>
      <circle cx="30" cy="30" r="3" fill="currentColor"/>
      <path d="M15 15 Q 22 22, 30 22 M15 15 Q 22 22, 22 30"/>
      <path d="M5 20 L 12 20 M20 5 L 20 12"/>
    </svg>
  </div>
  <div class="flourish br">
    <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="1.2">
      <path d="M5 5 L40 5 M5 5 L5 40" stroke-width="1.5"/>
      <path d="M10 10 Q 25 10, 30 25 Q 35 40, 50 40"/>
      <path d="M10 10 Q 10 25, 25 30 Q 40 35, 40 50"/>
      <circle cx="30" cy="30" r="3" fill="currentColor"/>
      <path d="M15 15 Q 22 22, 30 22 M15 15 Q 22 22, 22 30"/>
      <path d="M5 20 L 12 20 M20 5 L 20 12"/>
    </svg>
  </div>
 
  <div class="content">
 
    <!-- hero groom medallion -->
    <div class="groom-medallion">
      <div class="halo"></div>
      <div class="ring"></div>
      <img src="groom.png" alt="The Groom">
    </div>
 
    <div class="eyebrow-script">The moment you have been waiting for</div>
 
    <div class="name-row">
      <span class="beer left">🍺</span>
      <div class="name">Kilbey<span class="apos">&rsquo;s</span></div>
      <span class="beer right">🍺</span>
    </div>
    <div class="stag-do">Stag Do</div>
 
    <div class="ornament">
      <span class="line"></span>
      <span class="diamond">◆</span>
      <span class="diamond gold">◆</span>
      <span class="diamond">◆</span>
      <span class="line"></span>
    </div>
 
    <div class="countdown-label">Commencing in</div>
 
    <div class="countdown">
      <div class="unit">
        <div class="unit-num" id="days">00</div>
        <div class="unit-label">Days</div>
      </div>
      <div class="unit">
        <div class="unit-num" id="hours">00</div>
        <div class="unit-label">Hours</div>
      </div>
      <div class="unit">
        <div class="unit-num" id="mins">00</div>
        <div class="unit-label">Mins</div>
      </div>
      <div class="unit">
        <div class="unit-num" id="secs">00</div>
        <div class="unit-label">Secs</div>
      </div>
    </div>
 
    <!-- the redacted bit — destination & itinerary censored -->
    <div class="redacted-block">
      <div class="redacted-label">Destination</div>
      <div class="redacted-row">
        <span class="redacted-bar b1"></span>
        <span class="redacted-bar b2"></span>
      </div>
      <div class="redacted-label" style="margin-top: 8px;">Itinerary</div>
      <div class="redacted-row">
        <span class="redacted-bar b3"></span>
        <span class="redacted-bar b1"></span>
        <span class="redacted-bar b2"></span>
      </div>
      <div class="stamp-classified">Classified</div>
    </div>
 
    <div class="date-block">
      <div class="date-pill">14 — 17 May 2026</div>
      <div class="date-sub">Pack a bag · Trust the process</div>
    </div>
 
    <div class="signoff">
      Prepare yourself for a chaotic weekend.
      <span class="from">— The Best Men</span>
    </div>
 
  </div>
</div>
 
<script>
  // Departure: 05:45 on 14 May 2026
  const target = new Date('2026-05-14T05:45:00');
 
  function pad(n) { return String(n).padStart(2, '0'); }
 
  function tick(id, val) {
    const el = document.getElementById(id);
    const str = pad(val);
    if (el.textContent !== str) {
      el.textContent = str;
      el.classList.remove('tick');
      void el.offsetWidth;
      el.classList.add('tick');
    }
  }
 
  function update() {
    const now  = new Date();
    const diff = Math.max(0, target - now);
 
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff %  3600000) /   60000);
    const s = Math.floor((diff %    60000) /    1000);
 
    tick('days',  d);
    tick('hours', h);
    tick('mins',  m);
    tick('secs',  s);
  }
 
  update();
  setInterval(update, 1000);
</script>
</body>
</html>
